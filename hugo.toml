baseURL = "https://vk19n74-coder.github.io/valery-kozhevnikov/"
languageCode = "en-gb"
title = "Kozhevnikov Lab"
theme = "github.com/wowchemy/starter-hugo-research-group"

[module]
  [[module.imports]]
    path = "github.com/wowchemy/starter-hugo-research-group"
    [[module.imports.mounts]]
      source = "content"
      target = "content"
      excludeFiles = ["post/**", "publication/**", "authors/**", "home/**"]

[params]
  description = "Luminescent coordination chemistry research group at Northumbria University, Newcastle upon Tyne."
  author = "Valery Kozhevnikov"
  email = "valery.kozhevnikov@northumbria.ac.uk"
  google_scholar = "https://scholar.google.com/citations?user=YOURID"
  twitter = ""
  github = ""

  [params.address]
    street = "Department of Applied Sciences, Northumbria University"
    city = "Newcastle upon Tyne"
    region = ""
    postcode = "NE1 8ST"
    country = "United Kingdom"
    country_code = "GB"

  [params.appearance]
    theme_day = "minimal"
    theme_night = "minimal"
    font = "native"
    font_size = "L"

[menu]
  [[menu.main]]
    name = "Research"
    url = "#research"
    weight = 1
  [[menu.main]]
    name = "Publications"
    url = "#publications"
    weight = 2
  [[menu.main]]
    name = "Team"
    url = "#team"
    weight = 3
  [[menu.main]]
    name = "News"
    url = "#news"
    weight = 4
  [[menu.main]]
    name = "Contact"
    url = "#contact"
    weight = 5

[security]
  [security.funcs]
    getenv = ['^HUGO_', '^CI$', '^WC_']
