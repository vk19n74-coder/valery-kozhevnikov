baseURL = "https://vk19n74-coder.github.io/valery-kozhevnikov/"
languageCode = "en-gb"
title = "Kozhevnikov Lab"
theme = "github.com/wowchemy/starter-hugo-research-group"
[module]
  [[module.imports]]
    path = "github.com/wowchemy/starter-hugo-research-group"
[params]
  # SITE BASICS
  description = "A research group at Northumbria University studying luminescent coordination chemistry."
  author = "Valery Kozhevnikov"
  # CONTACT
  email = "your.email@northumbria.ac.uk"
  [params.address]
  street = "Department of Applied Sciences"
  city = "Newcastle upon Tyne"
  region = ""
  postcode = ""
  country = "United Kingdom"
  country_code = "GB"
  # SOCIAL LINKS (leave blank to hide)
  twitter = ""
  github = ""
  google_scholar = ""
  # APPEARANCE — required format for HugoBlox v5.9+
  [params.appearance]
    theme_day = "minimal"
    theme_night = "minimal"
    font = "native"
    font_size = "L"
[menu]
  [[menu.main]]
    name = "Research"
    url = "#research"
    weight = 1
  [[menu.main]]
    name = "Publications"
    url = "#publications"
    weight = 2
  [[menu.main]]
    name = "Team"
    url = "#team"
    weight = 3
  [[menu.main]]
    name = "News"
    url = "#news"
    weight = 4
  [[menu.main]]
    name = "Contact"
    url = "#contact"
    weight = 5
[security]
[security.funcs]
  getenv = ['^HUGO_', '^CI$', '^WC_']
