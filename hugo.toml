baseURL = "https://vk19n74-coder.github.io/valery-kozhevnikov/"
languageCode = "en-gb"
title = "Your Lab Name"
theme = "github.com/HugoBlox/theme-research-group"

[module]
  [[module.imports]]
    path = "github.com/HugoBlox/theme-research-group"

[params]
  # SITE BASICS
  description = "A research group at [University Name] studying [your research area]."
  author = "Your Name"

  # CONTACT
  email = "your.email@university.ac.uk"
  address = "Department of X, University Name, City, Postcode"

  # SOCIAL LINKS (leave blank to hide)
  twitter = ""
  github = ""
  google_scholar = ""

  # APPEARANCE
  appearance = "light"   # or "dark"
  font = "native"

[menu]
